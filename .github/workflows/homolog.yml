name: Homolog Tests

on:
  workflow_dispatch:
    inputs:
      rows:
        description: "Linhas sintéticas para benchmarks de output (test_output_postgres)"
        default: "100000"
        type: string
      repeat:
        description: "Repetições por benchmark"
        default: "3"
        type: string

jobs:
  homolog:
    name: Homolog E2E Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ODBC Driver 17 for SQL Server
        run: |
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/microsoft.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft.gpg] \
            https://packages.microsoft.com/ubuntu/22.04/prod jammy main" \
            | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update -q
          ACCEPT_EULA=Y sudo apt-get install -y msodbcsql17

      - name: Start local PostgreSQL
        run: |
          sudo systemctl start postgresql
          sudo -u postgres psql -c "CREATE USER ${{ secrets.DATABASE_USER }} WITH PASSWORD '${{ secrets.DATABASE_PASSWORD }}';"
          sudo -u postgres psql -c "CREATE DATABASE ${{ secrets.DATABASE_NAME }} OWNER ${{ secrets.DATABASE_USER }};"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run Homolog Tests
        env:
          # PostgreSQL local
          DATABASE_USER:     ${{ secrets.DATABASE_USER }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_HOST:     localhost
          DATABASE_PORT:     5432
          DATABASE_NAME:     ${{ secrets.DATABASE_NAME }}
          # SQL Server (Procfit PBS homolog)
          PROCFIT_DATABASE_USER:     ${{ secrets.PROCFIT_DATABASE_USER }}
          PROCFIT_DATABASE_PASSWORD: ${{ secrets.PROCFIT_DATABASE_PASSWORD }}
          PROCFIT_DATABASE_HOST:     ${{ secrets.PROCFIT_DATABASE_HOST }}
          PROCFIT_DATABASE_PORT:     ${{ secrets.PROCFIT_DATABASE_PORT }}
          PROCFIT_DATABASE_NAME:     ${{ secrets.PROCFIT_DATABASE_NAME }}
          # Oracle (Senior ERP) — opcional, ativa test_*oracle_real
          SENIOR_DATABASE_USER:         ${{ secrets.SENIOR_DATABASE_USER }}
          SENIOR_DATABASE_PASSWORD:     ${{ secrets.SENIOR_DATABASE_PASSWORD }}
          SENIOR_DATABASE_HOST:         ${{ secrets.SENIOR_DATABASE_HOST }}
          SENIOR_DATABASE_PORT:         ${{ secrets.SENIOR_DATABASE_PORT }}
          SENIOR_DATABASE_SERVICE_NAME: ${{ secrets.SENIOR_DATABASE_SERVICE_NAME }}
        run: |
          uv run pytest tests/homolog/ -v -s -m homolog \
            --rows=${{ github.event.inputs.rows }} \
            --repeat=${{ github.event.inputs.repeat }}
