name: teste_autocomplete
description: Pipeline used to test autocomplete
parameters:
  - name: title
    description: Pipeline title
    default: Autocomplete Test
    required: false
    type: string
loads:
  - type: database
    source: procfit
    tables:
      - alias: teste
        type: inline
        content: |
          SELECT 1 AS id, 'Teste' AS nome
        options:
          if_exists: replace
outputs:
  - type: database
    name: teste
    query: SELECT * FROM teste
    options:
      if_exists: replace
