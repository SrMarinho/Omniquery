name: senior_connection_test
description: Pipeline used to test the Senior connection
parameters:
  - name: title
    description: Pipeline title
loads:
  - type: database
    source: senior
    tables:
      - alias: clientes
        description: Senior customers query
        type: inline
        content: SELECT * FROM SAPIENS_PROD.E070FIL OFFSET 20 ROWS FETCH NEXT 10 ROWS ONLY
outputs:
  - name: outputs/teste.csv
    query: |
      SELECT * from clientes
    type: file
